<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--color-surface);font-family:var(--font-body);color:var(--color-text);padding:20px}
.row{display:flex;gap:16px;align-items:center}
.box{width:80px;height:60px;background:var(--color-surface-2);border:1px solid var(--color-border)}
.col{display:flex;flex-direction:column;align-items:center;gap:6px}
.lbl{font-size:11px;font-weight:600}
.code{font-size:9px;font-family:var(--font-mono);color:var(--color-text-faint)}
</style></head><body>
<div class="row">
<div class="col"><div class="box" style="border-radius:6px"></div><div class="lbl">sm 6</div><div class="code">--radius-sm</div></div>
<div class="col"><div class="box" style="border-radius:8px"></div><div class="lbl">md 8</div><div class="code">--radius-md</div></div>
<div class="col"><div class="box" style="border-radius:12px"></div><div class="lbl">lg 12</div><div class="code">--radius-lg</div></div>
<div class="col"><div class="box" style="border-radius:16px"></div><div class="lbl">xl 16</div><div class="code">--radius-xl</div></div>
<div class="col"><div class="box" style="border-radius:9999px"></div><div class="lbl">full</div><div class="code">--radius-full</div></div>
</div>
</body></html>
