<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--color-surface);font-family:var(--font-body);color:var(--color-text);padding:20px;display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:9999px;font-size:11px;font-weight:600;white-space:nowrap}
.b-green{background:#dcfce7;color:#16a34a}
.b-red{background:#fee2e2;color:#dc2626}
.b-orange{background:#ffedd5;color:#ea580c}
.b-blue{background:#dbeafe;color:#2563eb}
.b-purple{background:#ede9fe;color:#7c3aed}
.b-gray{background:#f1f3f5;color:#6b7280}
.b-gold{background:#fef9c3;color:#ca8a04}
.b-warn{background:#fef3c7;color:#d97706}
.dot{width:8px;height:8px;border-radius:9999px;display:inline-block;margin-right:6px}
.lbl{font-size:11px;color:var(--color-text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;width:90px}
</style></head><body>
<div class="row"><span class="lbl">Stato</span>
<span class="badge b-green">Aperta</span>
<span class="badge b-orange">In Lavorazione</span>
<span class="badge b-gray">Chiusa</span>
<span class="badge b-warn">Archiviata</span>
</div>
<div class="row"><span class="lbl">Tipo</span>
<span class="badge b-blue">FISSO</span>
<span class="badge b-green">VARIABILE</span>
<span class="badge b-purple">RICHIESTA</span>
<span class="badge b-gold">ESENTE</span>
</div>
<div class="row"><span class="lbl">Categoria</span>
<span style="font-size:13px"><span class="dot" style="background:#2563eb"></span>Assunzione</span>
<span style="font-size:13px"><span class="dot" style="background:#dc2626"></span>Cessazione</span>
<span style="font-size:13px"><span class="dot" style="background:#16a34a"></span>Buste Paga</span>
<span style="font-size:13px"><span class="dot" style="background:#7c3aed"></span>Modello 770</span>
</div>
<div class="row"><span class="lbl">Residuo</span>
<span class="badge b-red">€ 1.247,80</span>
<span class="badge b-green">€ 0,00</span>
</div>
</body></html>
