<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--color-surface);font-family:var(--font-body);color:var(--color-text);padding:18px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.col{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
.sw{width:100%;aspect-ratio:1.4;border-radius:var(--radius-md);border:1px solid var(--color-border)}
.lbl{font-size:10px;color:var(--color-text);font-weight:600}
.code{font-size:9px;font-family:var(--font-mono);color:var(--color-text-faint)}
</style></head><body>
<div class="grid">
<div class="col"><div class="sw" style="background:#f4f5f7"></div><div class="lbl">Bg</div><div class="code">#f4f5f7</div></div>
<div class="col"><div class="sw" style="background:#ffffff"></div><div class="lbl">Surface</div><div class="code">#ffffff</div></div>
<div class="col"><div class="sw" style="background:#f9fafb"></div><div class="lbl">Surf-2</div><div class="code">#f9fafb</div></div>
<div class="col"><div class="sw" style="background:#f1f3f5"></div><div class="lbl">Offset</div><div class="code">#f1f3f5</div></div>
<div class="col"><div class="sw" style="background:#e2e5e9"></div><div class="lbl">Border</div><div class="code">#e2e5e9</div></div>
<div class="col"><div class="sw" style="background:#9ca3af"></div><div class="lbl">Faint</div><div class="code">#9ca3af</div></div>
<div class="col"><div class="sw" style="background:#1a1d23"></div><div class="lbl">Text</div><div class="code">#1a1d23</div></div>
</div>
</body></html>
