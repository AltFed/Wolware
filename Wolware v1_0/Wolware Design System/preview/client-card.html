<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#f4f5f7;font-family:var(--font-body);color:var(--color-text);padding:20px;display:flex;gap:12px;flex-wrap:wrap}
.card{background:#fff;border:1px solid #e2e5e9;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);width:300px;display:flex;flex-direction:column;gap:10px}
.card.hover{box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:#1a6f5c}
.head{display:flex;align-items:flex-start;justify-content:space-between}
.av{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:#e8f5f2;color:#1a6f5c;font-weight:700;font-size:15px}
.name{font-weight:700;font-size:15px}
.sub{font-size:11px;color:#6b7280}
.meta{padding-top:10px;border-top:1px solid #eaecef;display:flex;flex-direction:column;gap:4px}
.mr{display:flex;gap:8px;align-items:center;font-size:11px;color:#6b7280}
</style></head><body>

</div>
<div class="card hover">
<div class="head"><div style="display:flex;gap:10px"><div class="av">R</div><div><div class="name">Studio Rossi SAS</div><div class="sub">SAS · Tariffario Studi</div></div></div></div>
<div class="meta"><div class="mr">Residuo: <strong style="color:#dc2626">€ 1.247,80</strong></div></div>
</div>
</body></html>
