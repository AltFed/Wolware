<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#f4f5f7;font-family:var(--font-body);color:var(--color-text);padding:20px;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;font-size:14px;box-shadow:0 12px 32px rgba(0,0,0,.12);min-width:240px;max-width:360px}
.t-success{background:#dcfce7;color:#16a34a;border:1px solid #16a34a}
.t-error{background:#fee2e2;color:#dc2626;border:1px solid #dc2626}
.t-info{background:#dbeafe;color:#2563eb;border:1px solid #2563eb}
.ic{font-size:16px;font-weight:700}
</style></head><body>
<div class="toast t-success"><span class="ic">✓</span><span>Cliente salvato con successo</span></div>
<div class="toast t-error"><span class="ic">✕</span><span>Errore: P.IVA già esistente</span></div>
<div class="toast t-info"><span class="ic">ℹ</span><span>3 pratiche in scadenza questa settimana</span></div>
</body></html>
