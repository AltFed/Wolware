<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#f4f5f7;font-family:var(--font-body);color:var(--color-text);padding:20px;display:flex;gap:14px;flex-wrap:wrap}
.card{flex:1;min-width:140px;background:#fff;border:1px solid #e2e5e9;border-radius:12px;padding:14px 18px;display:flex;flex-direction:column;gap:6px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.lbl{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em}
.val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.neg{color:#dc2626}
.pos{color:#16a34a}
</style></head><body>
<div class="card"><span class="lbl">Cassa</span><span class="val">€ 4.382,15</span></div>
<div class="card"><span class="lbl">Banca Intesa</span><span class="val">€ 18.247,00</span></div>
<div class="card" style="border-color:#dc2626;background:#fee2e2"><span class="lbl">Conto Spese</span><span class="val neg">€ -127,30</span></div>
<div class="card"><span class="lbl">Differenza Mese</span><span class="val pos">+ € 2.840,00</span></div>
</body></html>
