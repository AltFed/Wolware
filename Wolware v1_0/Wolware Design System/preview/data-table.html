<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#f4f5f7;font-family:var(--font-body);color:var(--color-text);padding:18px}
.wrap{background:#fff;border:1px solid #e2e5e9;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:#f9fafb}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e2e5e9}
td{padding:10px 14px;border-bottom:1px solid #eaecef;vertical-align:middle}
tr:last-child td{border:none}
.badge{display:inline-flex;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600}
.b-green{background:#dcfce7;color:#16a34a}
.b-orange{background:#ffedd5;color:#ea580c}
.b-blue{background:#dbeafe;color:#2563eb}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.id{font-family:'JetBrains Mono',monospace;font-size:11px;color:#6b7280}
</style></head><body>
<div class="wrap"><table>
<thead><tr><th>ID</th><th>Ditta</th><th>Tipo</th><th>Stato</th><th>Apertura</th></tr></thead>
<tbody>
<tr><td class="id">#0218</td><td style="font-weight:500">Bianchi & C. SRL</td><td><span class="dot" style="background:#2563eb"></span>Assunzione</td><td><span class="badge b-green">Aperta</span></td><td style="color:#6b7280">04/05/2026</td></tr>
<tr><td class="id">#0217</td><td style="font-weight:500">Studio Rossi SAS</td><td><span class="dot" style="background:#16a34a"></span>Buste Paga</td><td><span class="badge b-orange">In Lavorazione</span></td><td style="color:#6b7280">03/05/2026</td></tr>
<tr><td class="id">#0216</td><td style="font-weight:500">Verdi Costruzioni SPA</td><td><span class="dot" style="background:#7c3aed"></span>Modello 770</td><td><span class="badge b-blue">Chiusa</span></td><td style="color:#6b7280">02/05/2026</td></tr>
</tbody></table></div>
</body></html>
