<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#f4f5f7;font-family:var(--font-body);color:var(--color-text);padding:20px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.kpi{background:#fff;border:1px solid #e2e5e9;border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0}
.k-blue{background:#dbeafe;color:#2563eb}
.k-teal{background:#e8f5f2;color:#1a6f5c}
.k-orange{background:#ffedd5;color:#ea580c}
.k-green{background:#dcfce7;color:#16a34a}
.lbl{font-size:11px;color:#6b7280;font-weight:500;letter-spacing:.02em}
.val{font-size:22px;font-weight:700;line-height:1.2;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="grid">
<div class="kpi"><div class="icon k-blue"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div><div><div class="lbl">Ditte Clienti</div><div class="val">42</div></div></div>
<div class="kpi"><div class="icon k-teal"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div><div class="lbl">Pratiche Totali</div><div class="val">318</div></div></div>
<div class="kpi"><div class="icon k-orange"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><div class="lbl">Pratiche Aperte</div><div class="val">27</div></div></div>
<div class="kpi"><div class="icon k-green"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="lbl">Pratiche Chiuse</div><div class="val">291</div></div></div>
</div>
</body></html>
