<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--color-surface);font-family:var(--font-body);color:var(--color-text);padding:18px}
.row{display:flex;align-items:flex-end;gap:14px}
.col{display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{background:var(--color-primary);border-radius:3px;width:32px}
.lbl{font-size:10px;font-family:var(--font-mono);color:var(--color-text-faint)}
.val{font-size:11px;font-weight:600;color:var(--color-text)}
</style></head><body>
<div class="row">
<div class="col"><div class="bar" style="height:4px"></div><div class="val">4</div><div class="lbl">--space-1</div></div>
<div class="col"><div class="bar" style="height:8px"></div><div class="val">8</div><div class="lbl">--space-2</div></div>
<div class="col"><div class="bar" style="height:12px"></div><div class="val">12</div><div class="lbl">--space-3</div></div>
<div class="col"><div class="bar" style="height:16px"></div><div class="val">16</div><div class="lbl">--space-4</div></div>
<div class="col"><div class="bar" style="height:24px"></div><div class="val">24</div><div class="lbl">--space-6</div></div>
<div class="col"><div class="bar" style="height:32px"></div><div class="val">32</div><div class="lbl">--space-8</div></div>
<div class="col"><div class="bar" style="height:48px"></div><div class="val">48</div><div class="lbl">--space-12</div></div>
<div class="col"><div class="bar" style="height:64px"></div><div class="val">64</div><div class="lbl">--space-16</div></div>
</div>
</body></html>
