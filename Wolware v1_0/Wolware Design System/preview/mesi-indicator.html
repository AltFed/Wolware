<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#f4f5f7;font-family:var(--font-body);color:var(--color-text);padding:20px}
.wrap{background:#fff;border:1px solid #e2e5e9;border-radius:12px;padding:14px 18px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.title{font-weight:600;font-size:14px}
.mese-block{display:flex;align-items:center;gap:6px;line-height:1;margin-bottom:5px}
.mese-label{font-size:9px;font-weight:700;color:#9ca3af;width:14px;text-transform:uppercase}
.mese-dots{display:flex;gap:2px}
.mese-dot{width:18px;height:18px;border-radius:3px;font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;background:#f1f3f5;color:#9ca3af}
.mese-dot.done{background:#e8f5f2;color:#1a6f5c}
.lbl{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
</style></head><body>
<div class="wrap">
<div class="head"><span class="title">Bianchi &amp; C. SRL</span><span class="lbl">Cadenza Mensile</span></div>
<div class="mese-block"><span class="mese-label">CF</span><div class="mese-dots">
<span class="mese-dot done">G</span><span class="mese-dot done">F</span><span class="mese-dot done">M</span><span class="mese-dot done">A</span><span class="mese-dot done">M</span><span class="mese-dot">G</span><span class="mese-dot">L</span><span class="mese-dot">A</span><span class="mese-dot">S</span><span class="mese-dot">O</span><span class="mese-dot">N</span><span class="mese-dot">D</span>
</div></div>
<div class="mese-block"><span class="mese-label">VR</span><div class="mese-dots">
<span class="mese-dot done">G</span><span class="mese-dot done">F</span><span class="mese-dot done">M</span><span class="mese-dot done">A</span><span class="mese-dot">M</span><span class="mese-dot">G</span><span class="mese-dot">L</span><span class="mese-dot">A</span><span class="mese-dot">S</span><span class="mese-dot">O</span><span class="mese-dot">N</span><span class="mese-dot">D</span>
</div></div>
</div>
</body></html>
