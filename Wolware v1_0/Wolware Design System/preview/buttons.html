<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--color-surface);font-family:var(--font-body);color:var(--color-text);padding:20px;display:flex;flex-direction:column;gap:14px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:0 16px;height:36px;border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;font-family:inherit;color:inherit}
.btn-primary{background:#1a6f5c;color:#fff}
.btn-secondary{background:#fff;color:#1a1d23;border:1px solid #e2e5e9;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.btn-ghost{color:#6b7280;background:none}
.btn-sm{height:30px;padding:0 12px;font-size:13px}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center}
.svgi{width:14px;height:14px}
</style></head><body>
<div class="row">
<button class="btn btn-primary"><svg class="svgi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nuova Pratica</button>
<button class="btn btn-secondary">Duplica Esistente</button>
<button class="btn btn-ghost btn-sm">Vedi tutte →</button>
</div>
<div class="row">
<button class="btn btn-primary btn-sm">Applica</button>
<button class="btn btn-secondary btn-sm">Annulla</button>
<button class="btn btn-secondary btn-sm"><svg class="svgi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Importa Excel</button>
<button class="btn btn-icon btn-secondary"><svg class="svgi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
</div>
</body></html>
