<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#f4f5f7;font-family:var(--font-body);color:var(--color-text);padding:20px;position:relative;height:280px}
.menu{position:absolute;top:20px;left:20px;background:#fff;border:1px solid #e2e5e9;border-radius:12px;box-shadow:0 12px 32px rgba(0,0,0,.12);min-width:240px;padding:4px;overflow:hidden}
.lbl{padding:8px 12px 4px;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em}
.it{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:6px;font-size:13px;color:#1a1d23;cursor:pointer}
.it:hover{background:#f1f3f5}
.it.hov{background:#f1f3f5}
.dot{width:8px;height:8px;border-radius:50%}
</style></head><body>
<div class="menu">
<div class="lbl">Pratiche Dipendenti</div>
<div class="it"><span class="dot" style="background:#2563eb"></span>Assunzione</div>
<div class="it hov"><span class="dot" style="background:#dc2626"></span>Cessazione</div>
<div class="it"><span class="dot" style="background:#ea580c"></span>Trasformazione Contratto</div>
<div class="lbl">Paghe &amp; Contributi</div>
<div class="it"><span class="dot" style="background:#16a34a"></span>Elaborazione Buste Paga</div>
<div class="it"><span class="dot" style="background:#16a34a"></span>Variazione Retributiva</div>
<div class="lbl">Enti Previdenziali</div>
<div class="it"><span class="dot" style="background:#7c3aed"></span>Comunicazione INPS</div>
<div class="it"><span class="dot" style="background:#1a6f5c"></span>Comunicazione INAIL</div>
</div>
</body></html>
