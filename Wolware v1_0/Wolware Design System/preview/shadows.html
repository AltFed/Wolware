<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#f4f5f7;font-family:var(--font-body);color:var(--color-text);padding:30px}
.row{display:flex;gap:24px;align-items:center;justify-content:space-around}
.box{width:90px;height:70px;background:#fff;border-radius:12px;display:flex;align-items:flex-end;justify-content:center;padding:6px}
.lbl{font-size:10px;font-family:var(--font-mono);color:var(--color-text-faint)}
</style></head><body>
<div class="row">
<div class="box" style="box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)"><span class="lbl">sm</span></div>
<div class="box" style="box-shadow:0 4px 12px rgba(0,0,0,.08)"><span class="lbl">md</span></div>
<div class="box" style="box-shadow:0 12px 32px rgba(0,0,0,.12)"><span class="lbl">lg</span></div>
<div class="box" style="box-shadow:0 24px 48px rgba(0,0,0,.16)"><span class="lbl">xl</span></div>
</div>
</body></html>
