<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--color-surface);font-family:var(--font-body);color:var(--color-text);padding:18px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.cell{display:flex;align-items:center;gap:8px;padding:8px;background:var(--color-surface-2);border:1px solid var(--color-border);border-radius:var(--radius-md)}
.dot{width:18px;height:18px;border-radius:6px;flex-shrink:0;border:1px solid rgba(0,0,0,.05)}
.tint{width:42px;height:18px;border-radius:4px;flex-shrink:0}
.lbl{font-size:11px;font-weight:600;color:var(--color-text)}
.code{font-size:9px;font-family:var(--font-mono);color:var(--color-text-faint)}
</style></head><body>
<div class="grid">
<div class="cell"><div class="dot" style="background:#16a34a"></div><div class="tint" style="background:#dcfce7"></div><div><div class="lbl">Success</div><div class="code">#16a34a</div></div></div>
<div class="cell"><div class="dot" style="background:#dc2626"></div><div class="tint" style="background:#fee2e2"></div><div><div class="lbl">Error</div><div class="code">#dc2626</div></div></div>
<div class="cell"><div class="dot" style="background:#d97706"></div><div class="tint" style="background:#fef3c7"></div><div><div class="lbl">Warning</div><div class="code">#d97706</div></div></div>
<div class="cell"><div class="dot" style="background:#2563eb"></div><div class="tint" style="background:#dbeafe"></div><div><div class="lbl">Blue</div><div class="code">#2563eb</div></div></div>
<div class="cell"><div class="dot" style="background:#ea580c"></div><div class="tint" style="background:#ffedd5"></div><div><div class="lbl">Orange</div><div class="code">#ea580c</div></div></div>
<div class="cell"><div class="dot" style="background:#7c3aed"></div><div class="tint" style="background:#ede9fe"></div><div><div class="lbl">Purple</div><div class="code">#7c3aed</div></div></div>
<div class="cell"><div class="dot" style="background:#ca8a04"></div><div class="tint" style="background:#fef9c3"></div><div><div class="lbl">Gold</div><div class="code">#ca8a04</div></div></div>
<div class="cell"><div class="dot" style="background:#1a6f5c"></div><div class="tint" style="background:#e8f5f2"></div><div><div class="lbl">Teal</div><div class="code">#1a6f5c</div></div></div>
</div>
</body></html>
